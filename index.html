<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Lottery | Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --accent: #7c3aed; --secondary: #f59e0b; --text: #f0f6fc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; }
        
        /* Стили карточек как в Demo */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--card); border: 1px solid #30363d; padding: 20px; border-radius: 12px; position: relative; overflow: hidden; }
        .stat-label { color: #8b949e; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .stat-value { font-size: 24px; font-weight: 700; margin-top: 8px; color: #3fb950; }
        
        /* Главная панель покупки */
        .main-card { background: var(--card); border: 1px solid #30363d; border-radius: 16px; padding: 40px; text-align: center; position: relative; }
        .progress-container { background: #30363d; height: 8px; border-radius: 4px; margin: 25px 0; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #7c3aed, #3b82f6); height: 100%; width: 0%; transition: width 1s ease; }
        
        .buy-zone { background: #0d1117; border-radius: 12px; padding: 30px; margin-top: 30px; border: 1px dashed #30363d; }
        .input-group { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 20px 0; }
        input { background: #161b22; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 8px; width: 60px; text-align: center; font-size: 18px; }
        
        button { background: #f59e0b; color: #000; border: none; padding: 14px 40px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 16px; transition: 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245, 158, 11, 0.3); }
        #connectBtn { background: var(--accent); color: white; }

        .badge { background: #23863622; color: #3fb950; padding: 4px 12px; border-radius: 20px; font-size: 12px; border: 1px solid #238636; }
    </style>
</head>
<body>
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">💰 Prize Pool</div>
                <div class="stat-value" id="prizePool">0.00 ANKR</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🎟️ Tickets Sold</div>
                <div class="stat-value" id="ticketsSold">0 / 100</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">👤 Your Tickets</div>
                <div class="stat-value" id="yourTickets">0</div>
            </div>
        </div>

        <div class="main-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="badge">Round #1</span>
                <small id="netName" style="color: #8b949e;">Neura Testnet</small>
            </div>
            
            <h1 style="margin: 20px 0 10px 0;">Neural Lottery 🧠</h1>
            <p style="color: #8b949e;">Secure decentralized lottery powered by AI nodes</p>

            <div class="progress-container"><div class="progress-bar" id="pBar"></div></div>

            <button id="connectBtn">Connect Wallet</button>

            <div id="gameArea" style="display:none;">
                <div class="buy-zone">
                    <h3>Buy Tickets</h3>
                    <p style="font-size: 14px; color: #8b949e;">0.01 ANKR per ticket</p>
                    <div class="input-group">
                        <input type="number" id="ticketQty" value="1" min="1">
                        <button id="buyBtn">Purchase Tickets</button>
                    </div>
                    <p id="status" style="font-size: 13px; color: #3fb950;"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const contractAddress = "0xA96DAF4459E7d01EF60A8fDd25b7516D9c973386";
        const abi = ["function buyTickets(uint256 amount) external payable", "function ticketsSold() public view returns (uint256)"];
        let signer, contract;

        async function refreshData() {
            try {
                const sold = await contract.ticketsSold();
                const bal = await contract.provider.getBalance(contractAddress);
                document.getElementById('ticketsSold').innerText = sold + " / 100";
                document.getElementById('prizePool').innerText = ethers.utils.formatEther(bal) + " ANKR";
                document.getElementById('pBar').style.width = sold + "%";
            } catch(e) {}
        }

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                contract = new ethers.Contract(contractAddress, abi, signer);
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('gameArea').style.display = 'block';
                refreshData();
                setInterval(refreshData, 5000);
            }
        };

        document.getElementById('buyBtn').onclick = async () => {
            const qty = document.getElementById('ticketQty').value;
            const val = ethers.utils.parseEther("0.01").mul(qty);
            try {
                const tx = await contract.buyTickets(qty, { value: val });
                document.getElementById('status').innerText = "Transaction pending...";
                await tx.wait();
                document.getElementById('status').innerText = "Success!";
                refreshData();
            } catch(e) { document.getElementById('status').innerText = "Error!"; }
        };
    </script>
</body>
</html>
